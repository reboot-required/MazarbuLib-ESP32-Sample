[env]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
lib_deps =
  ; Pinned to the 2026-04-05 commit that added PlatformIO library metadata and
  ; C++ compatibility, matching the sample's previously vendored dependency.
  https://github.com/reboot-required/MazarbuLib.git#a2b799f5b43652a186de67200807479ac40abfd1
build_flags =
  -Wall
  -Wextra
  -Werror

; Simple demo — two screens, GPIO inputs, chip temperature.
[env:simple]
build_src_filter = -<*> +<main.cpp>

; Advanced demo — four screens packed with live ESP32 metrics and WiFi scan.
[env:advanced]
build_src_filter = -<*> +<main_advanced.cpp>
